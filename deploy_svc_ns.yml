apiVersion: v1
kind: Namespace
metadata:
  name: simple-webapp

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-webapp
  namespace: simple-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-webapp
  template:
    metadata:
      labels:
        app: simple-webapp
    spec:
      containers:
      - name: simple-webapp
        image: vnit2075/simple-webapp:v1
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: simple-webapp-service
  namespace: simple-webapp
spec:
  type: NodePort
  selector:
    app: simple-webapp
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
